# netlify.toml
# Netlify configuration for VESPER
# No build step needed — pure static HTML + serverless functions

[build]
  publish = "."
  functions = "netlify/functions"

# Route all /netlify/functions/* calls to the functions directory
[[redirects]]
  from = "/netlify/functions/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache HTML: no cache (always fresh)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
